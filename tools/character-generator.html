<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 角色设定卡生成器 — 角色设定卡 | AI Film Tools</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0b;--surface:#141416;--surface-2:#1c1c1f;--surface-3:#252529;
      --border:#2a2a2e;--border-light:#3a3a3e;--text:#f4f4f5;--text-2:#a1a1aa;--text-3:#71717a;
      --accent:#6366f1;--accent-hover:#818cf8;--accent-subtle:rgba(99,102,241,0.1);--accent-glow:rgba(99,102,241,0.25);
      --green:#22c55e;--green-subtle:rgba(34,197,94,0.1);--amber:#eab308;--amber-subtle:rgba(234,179,8,0.1);
      --red:#ef4444;--gradient:linear-gradient(135deg,#6366f1,#a855f7,#ec4899);--gradient-2:linear-gradient(135deg,#6366f1,#8b5cf6);
      --radius:12px;--radius-sm:8px;--radius-lg:16px;--max-width:960px
    }
    html{font-size:16px;scroll-behavior:smooth}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
      background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh
    }
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}

    .header{
      position:fixed;top:0;left:0;right:0;height:56px;
      background:rgba(20,20,22,0.85);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
      padding:0 24px;z-index:1000
    }
    .header .logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700}
    .header .logo-icon{width:28px;height:28px;background:var(--gradient);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
    .header nav{display:flex;gap:4px;align-items:center}
    .header nav a{color:var(--text-2);font-size:13px;font-weight:500;padding:6px 12px;border-radius:var(--radius-sm);transition:all .2s;text-decoration:none}
    .header nav a:hover{color:var(--text);background:var(--surface-2)}
    .header nav a.active{color:var(--accent);background:var(--accent-subtle)}

    .main{padding:80px 24px 40px;max-width:var(--max-width);margin:0 auto}
    .page-title{font-size:28px;font-weight:800;margin-bottom:4px}
    .page-desc{color:var(--text-2);font-size:15px;margin-bottom:28px}

    .settings-bar{
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:16px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px
    }
    .settings-bar label{font-size:12px;color:var(--text-3);font-weight:600;white-space:nowrap}
    .settings-bar input,.settings-bar select{
      background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);
      color:var(--text);padding:7px 12px;font-size:13px;outline:none;transition:border-color .2s
    }
    .settings-bar input:focus,.settings-bar select:focus{border-color:var(--accent)}
    .settings-bar input[type="text"]{min-width:140px;flex:1}
    .settings-bar select{min-width:110px}
    .settings-toggle{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:13px;padding:6px 10px;border-radius:var(--radius-sm);transition:all .2s}
    .settings-toggle:hover{color:var(--text);background:var(--surface-2)}

    .extra-settings{display:none;margin-top:12px;padding:12px 16px;background:var(--surface-2);border-radius:var(--radius-sm);gap:12px;flex-wrap:wrap;align-items:center}
    .extra-settings.open{display:flex}
    .extra-settings label{font-size:12px;color:var(--text-3);font-weight:600;white-space:nowrap}
    .extra-settings input{background:var(--surface-3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:6px 10px;font-size:13px;outline:none;transition:border-color .2s}
    .extra-settings input:focus{border-color:var(--accent)}
    .extra-settings input[type="text"]{min-width:180px;flex:1}

    .input-section{
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:20px;margin-bottom:20px
    }
    .input-section textarea{
      width:100%;min-height:140px;background:var(--surface-2);border:1px solid var(--border);
      border-radius:var(--radius-sm);color:var(--text);padding:14px;font-size:14px;line-height:1.7;
      resize:vertical;outline:none;transition:border-color .2s;font-family:inherit
    }
    .input-section textarea:focus{border-color:var(--accent)}
    .input-section textarea::placeholder{color:var(--text-3)}
    .input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:10px}
    .char-count{font-size:12px;color:var(--text-3)}
    .btn-group{display:flex;gap:8px;flex-wrap:wrap}

    .btn{
      display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:var(--radius-sm);
      font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;white-space:nowrap
    }
    .btn-primary{background:var(--gradient-2);color:#fff}
    .btn-primary:hover{opacity:.9;box-shadow:0 0 24px var(--accent-glow)}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
    .btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
    .btn-secondary:hover{background:var(--surface-3);border-color:var(--border-light)}
    .btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}
    .btn-ghost:hover{color:var(--text);background:var(--surface-2)}
    .btn-sm{padding:6px 14px;font-size:12px}

    .examples{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .example-chip{
      background:var(--surface-2);border:1px solid var(--border);border-radius:20px;
      padding:4px 14px;font-size:12px;color:var(--text-2);cursor:pointer;transition:all .2s
    }
    .example-chip:hover{background:var(--surface-3);border-color:var(--accent);color:var(--accent)}

    .loading-state{display:none;text-align:center;padding:48px 20px}
    .loading-state.active{display:block}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-state p{color:var(--text-2);font-size:14px}

    .error-message{display:none;background:var(--red);color:#fff;padding:12px 18px;border-radius:var(--radius-sm);margin-bottom:16px;font-size:14px}
    .error-message.active{display:block}

    .results-section{display:none}
    .results-section.active{display:block}
    .results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
    .results-header h2{font-size:18px;font-weight:700}
    .results-actions{display:flex;gap:8px;flex-wrap:wrap}

    /* Character Card */
    .char-card{
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
      overflow:hidden;margin-bottom:24px
    }
    .char-card-header{
      background:var(--gradient);padding:20px 24px;display:flex;justify-content:space-between;align-items:flex-start
    }
    .char-card-header .char-name{font-size:24px;font-weight:800;color:#fff}
    .char-card-header .char-title{font-size:14px;color:rgba(255,255,255,0.8);margin-top:2px}
    .char-card-header .char-role{display:inline-block;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.2);color:#fff;font-size:12px;font-weight:600}
    .char-card-body{padding:24px}
    .char-section{margin-bottom:20px}
    .char-section:last-child{margin-bottom:0}
    .char-section-title{
      font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;
      margin-bottom:8px;display:flex;align-items:center;gap:6px
    }
    .char-section-content{font-size:14px;color:var(--text-2);line-height:1.8}
    .char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
    .char-grid-item{
      background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);
      padding:12px 14px
    }
    .char-grid-item .label{font-size:11px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
    .char-grid-item .value{font-size:14px;color:var(--text)}
    .char-trait-list{display:flex;flex-wrap:wrap;gap:6px}
    .char-trait{
      font-size:12px;padding:4px 12px;border-radius:20px;background:var(--accent-subtle);color:var(--accent);border:1px solid rgba(99,102,241,0.2)
    }
    .char-trait.amber{background:var(--amber-subtle);color:var(--amber);border-color:rgba(234,179,8,0.2)}
    .char-trait.green{background:var(--green-subtle);color:var(--green);border-color:rgba(34,197,94,0.2)}
    .char-trait.red{background:rgba(239,68,68,0.1);color:var(--red);border-color:rgba(239,68,68,0.2)}
    .char-quote{
      background:var(--surface-2);border-left:3px solid var(--accent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;
      padding:14px 18px;font-size:14px;color:var(--text-2);font-style:italic;margin-top:8px
    }
    .char-quote::before{content:'"';color:var(--accent);font-size:20px;font-weight:700;margin-right:4px}
    .char-quote::after{content:'"';color:var(--accent);font-size:20px;font-weight:700;margin-left:4px}
    .char-prompt-box{
      background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);
      padding:14px;font-size:13px;line-height:1.7;color:var(--text-2);font-family:'SF Mono','Menlo','Monaco',monospace;
      white-space:pre-wrap;word-break:break-word;margin-top:8px
    }
    .char-prompt-box .lang-label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

    .toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface-3);
      border:1px solid var(--border);color:var(--text);padding:10px 24px;border-radius:var(--radius-sm);
      font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none
    }
    .toast.active{opacity:1}

    @media(max-width:640px){
      .settings-bar{flex-direction:column;align-items:stretch}
      .settings-bar input[type="text"]{min-width:0;width:100%}
      .extra-settings{flex-direction:column;align-items:stretch}
      .extra-settings input[type="text"]{width:100%}
      .main{padding:76px 16px 30px}
      .page-title{font-size:22px}
      .input-section textarea{min-height:100px}
      .char-card-header{padding:16px 18px;flex-direction:column;gap:8px}
      .char-card-header .char-name{font-size:20px}
      .char-card-body{padding:18px}
      .char-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo"><span class="logo-icon">🎬</span> AI Film Tools</div>
  <nav>
    <a href="prompt-generator.html">提示词</a>
    <a href="storyboard-generator.html">分镜</a>
    <a href="character-generator.html" class="active">角色</a>
  </nav>
</header>

<div class="main">
  <h1 class="page-title">👤 AI 角色设定卡生成器</h1>
  <p class="page-desc">输入角色描述，AI 将生成完整的角色设定卡，包含外貌、性格、背景故事、能力特征和 AI 生成提示词</p>

  <div class="settings-bar">
    <label for="apiKey">API Key</label>
    <input type="text" id="apiKey" placeholder="sk-... 输入你的 API 密钥" value="">
    <button class="settings-toggle" id="settingsToggle">⚙️ 更多设置</button>
  </div>
  <div class="extra-settings" id="extraSettings">
    <label for="apiBase">API 地址</label>
    <input type="text" id="apiBase" placeholder="https://api.deepseek.com" value="https://api.deepseek.com">
    <label for="modelName">模型</label>
    <input type="text" id="modelName" placeholder="deepseek-chat" value="deepseek-chat">
    <label for="genreSelect">类型</label>
    <select id="genreSelect">
      <option value="realistic">写实/剧情</option>
      <option value="fantasy">奇幻</option>
      <option value="sci-fi">科幻</option>
      <option value="anime">动漫</option>
      <option value="horror">恐怖</option>
    </select>
  </div>

  <div class="input-section">
    <div class="examples">
      <span class="example-chip" data-example="一位退休的特工，年近五十，沧桑但身手不凡，在东京经营一家旧书店，偶尔接一些黑市情报交易">🕵️ 退役特工</span>
      <span class="example-chip" data-example="森林精灵族的年轻公主，拥有与动物沟通的能力，性格倔强叛逆，不愿接受王室安排的婚姻">🧝 精灵公主</span>
      <span class="example-chip" data-example="AI 机器人修复师，生活在2222年的地下城，专门修复被遗弃的古代机器人，梦想是找到传说中的"地表"">🤖 机械修复师</span>
      <span class="example-chip" data-example="古代剑客，因师门灭门独自流浪，沉默寡言但内心温柔，腰间的酒壶从不离身">🗡️ 流浪剑客</span>
    </div>
    <textarea id="charInput" placeholder="描述你想创建的角色...&#10;例如：一名35岁的私家侦探，曾是警局重案组警员，因某次任务失误被开除。性格阴郁但正义感强，抽烟很凶，住在城市老城区一间破旧的公寓里，养着一只橘猫。擅长逻辑推理和跟踪，但不太会用现代科技产品。"></textarea>
    <div class="input-footer">
      <span class="char-count" id="charCount">0</span>
      <div class="btn-group">
        <button class="btn btn-primary" id="generateBtn">✨ 生成角色设定卡</button>
        <button class="btn btn-ghost btn-sm" id="clearBtn">清空</button>
      </div>
    </div>
  </div>

  <div class="error-message" id="errorMessage"></div>

  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <p>🎭 AI 正在构思角色设定...</p>
  </div>

  <div class="results-section" id="resultsSection">
    <div class="results-header">
      <h2>📄 角色设定卡</h2>
      <div class="results-actions">
        <button class="btn btn-secondary btn-sm" id="copyBtn">📋 复制全部</button>
        <button class="btn btn-secondary btn-sm" id="exportBtn">📥 导出 Markdown</button>
        <button class="btn btn-ghost btn-sm" id="newBtn">🔄 重新生成</button>
      </div>
    </div>
    <div id="charCardContainer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  'use strict';

  const apiKeyInput = document.getElementById('apiKey');
  const apiBaseInput = document.getElementById('apiBase');
  const modelNameInput = document.getElementById('modelName');
  const charInput = document.getElementById('charInput');
  const genreSelect = document.getElementById('genreSelect');
  const generateBtn = document.getElementById('generateBtn');
  const clearBtn = document.getElementById('clearBtn');
  const errorMessage = document.getElementById('errorMessage');
  const loadingState = document.getElementById('loadingState');
  const resultsSection = document.getElementById('resultsSection');
  const charCardContainer = document.getElementById('charCardContainer');
  const copyBtn = document.getElementById('copyBtn');
  const exportBtn = document.getElementById('exportBtn');
  const newBtn = document.getElementById('newBtn');
  const charCount = document.getElementById('charCount');
  const toast = document.getElementById('toast');
  const settingsToggle = document.getElementById('settingsToggle');
  const extraSettings = document.getElementById('extraSettings');

  let currentCharacter = null;

  try {
    const savedKey = localStorage.getItem('af_api_key');
    if (savedKey) apiKeyInput.value = savedKey;
    const savedBase = localStorage.getItem('af_api_base');
    if (savedBase) apiBaseInput.value = savedBase;
    const savedModel = localStorage.getItem('af_api_model');
    if (savedModel) modelNameInput.value = savedModel;
  } catch(e) {}

  apiKeyInput.addEventListener('change', () => { try { localStorage.setItem('af_api_key', apiKeyInput.value); } catch(e) {} });
  apiBaseInput.addEventListener('change', () => { try { localStorage.setItem('af_api_base', apiBaseInput.value); } catch(e) {} });
  modelNameInput.addEventListener('change', () => { try { localStorage.setItem('af_api_model', modelNameInput.value); } catch(e) {} });

  settingsToggle.addEventListener('click', () => {
    extraSettings.classList.toggle('open');
    settingsToggle.textContent = extraSettings.classList.contains('open') ? '🔽 收起设置' : '⚙️ 更多设置';
  });

  charInput.addEventListener('input', () => { charCount.textContent = charInput.value.length; });

  document.querySelectorAll('.example-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      charInput.value = chip.dataset.example;
      charCount.textContent = charInput.value.length;
      charInput.focus();
    });
  });

  clearBtn.addEventListener('click', () => {
    charInput.value = '';
    charCount.textContent = '0';
    charInput.focus();
  });

  generateBtn.addEventListener('click', generateCharacter);
  charInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.metaKey) generateCharacter();
  });

  async function generateCharacter() {
    const desc = charInput.value.trim();
    const apiKey = apiKeyInput.value.trim();
    const apiBase = apiBaseInput.value.trim() || 'https://api.deepseek.com';
    const model = modelNameInput.value.trim() || 'deepseek-chat';
    const genre = genreSelect.value;

    if (!desc) { showError('请先描述你的角色'); return; }
    if (!apiKey) { showError('请输入你的 API 密钥'); return; }

    generateBtn.disabled = true;
    generateBtn.textContent = '⏳ 生成中...';
    resultsSection.classList.remove('active');
    loadingState.classList.add('active');
    errorMessage.classList.remove('active');

    const genreMap = {
      realistic: '写实/剧情片风格，角色设定要真实可信，有生活质感',
      fantasy: '奇幻风格，包含魔法、神秘元素、非人种族',
      sci-fi: '科幻风格，包含未来科技、赛博格、外星文明等元素',
      anime: '动漫/二次元风格，角色设定可以参考日式动漫特点',
      horror: '恐怖/惊悚风格，角色设定要有黑暗、诡异、不安的氛围'
    };

    const systemPrompt = `你是一位专业的角色设计师和编剧。根据用户提供的角色描述，生成一份完整的角色设定卡。

类型要求：${genreMap[genre] || genreMap.realistic}

仅输出 JSON 对象（不要 markdown 标记，不要附加说明）。格式：
{
  "name": "角色姓名",
  "role": "角色定位/标签（如：主角 / 反派 / 配角）",
  "title": "称号或头衔",
  "basic": {
    "age": "年龄",
    "gender": "性别",
    "occupation": "职业",
    "nationality": "国籍/出身",
    "residence": "居住地"
  },
  "appearance": {
    "height": "身高",
    "build": "体型",
    "hair": "发型发色",
    "eyes": "瞳色/眼神特征",
    "features": "面部特征/特殊标记",
    "style": "着装风格",
    "distinctive": "最显著的外貌特征"
  },
  "personality": {
    "type": "性格类型（如：INTJ / 外向 / 内向）",
    "traits": ["性格特点1", "性格特点2", "性格特点3", "性格特点4", "性格特点5"],
    "strengths": ["优势1", "优势2", "优势3"],
    "weaknesses": ["弱点1", "弱点2", "弱点3"],
    "fears": "最深层的恐惧",
    "desire": "最强烈的欲望/动机"
  },
  "background": {
    "origin": "出身背景",
    "key_event": "关键转折事件",
    "current_status": "当前状态",
    "secret": "不为人知的秘密（可选项）"
  },
  "abilities": {
    "skills": ["技能1", "技能2", "技能3", "技能4"],
    "special": "特殊能力或专长",
    "limitation": "限制或弱点"
  },
  "relationships": [
    { "name": "关系人名", "relation": "关系（如：好友/宿敌/恋人）", "description": "关系描述" }
  ],
  "quote": "一句能代表角色性格的经典台词",
  "prompt": "完整的 AI 图像生成提示词（英文，适合 Midjourney / Stable Diffusion，描述角色的外貌、服装、姿态、背景氛围）"
}

规则：
- 角色姓名和设定要有创意且符合所选类型风格
- 性格特点至少5个，优势和弱点各3个
- 背景故事要完整且合理
- 关系至少2个
- 提示词要详尽丰富，包含角色外貌、服装细节、环境氛围、镜头参数
- 使用双引号，内部双引号用反斜杠转义`;

    try {
      const response = await fetch(apiBase.replace(/\/+$/,'') + '/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify({
          model: model,
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: '角色描述：' + desc }
          ],
          temperature: 0.85,
          max_tokens: 4096
        })
      });

      if (!response.ok) {
        const err = await response.text();
        throw new Error('API 错误 (' + response.status + '): ' + err);
      }

      const data = await response.json();
      const content = data.choices[0].message.content;

      let character;
      try {
        character = JSON.parse(content);
      } catch(e) {
        const jsonMatch = content.match(/\`\`\`(?:json)?\s*([\s\S]*?)\`\`\`/);
        if (jsonMatch) {
          character = JSON.parse(jsonMatch[1]);
        } else {
          const objMatch = content.match(/\{[\s\S]*\}/);
          if (objMatch) {
            character = JSON.parse(objMatch[0]);
          } else {
            throw new Error('无法从 API 响应中解析角色数据');
          }
        }
      }

      currentCharacter = character;
      renderCharacter(character);
      resultsSection.classList.add('active');
      resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      showToast('✅ 角色设定卡已生成');
    } catch(err) {
      showError('⚠️ ' + err.message);
    } finally {
      generateBtn.disabled = false;
      generateBtn.textContent = '✨ 生成角色设定卡';
      loadingState.classList.remove('active');
    }
  }

  function renderCharacter(c) {
    const b = c.basic || {};
    const a = c.appearance || {};
    const p = c.personality || {};
    const bg = c.background || {};
    const ab = c.abilities || {};
    const rels = c.relationships || [];
    const traits = p.traits || [];
    const strengths = p.strengths || [];
    const weaknesses = p.weaknesses || [];
    const skills = ab.skills || [];

    const card = document.createElement('div');
    card.className = 'char-card';
    card.innerHTML = `
      <div class="char-card-header">
        <div>
          <div class="char-name">${escapeHtml(c.name || '未命名角色')}</div>
          <div class="char-title">${escapeHtml(c.title || '')}</div>
        </div>
        <span class="char-role">${escapeHtml(c.role || '角色')}</span>
      </div>
      <div class="char-card-body">
        <!-- 基本信息 -->
        <div class="char-section">
          <div class="char-section-title">📋 基本信息</div>
          <div class="char-grid">
            ${b.age ? `<div class="char-grid-item"><div class="label">年龄</div><div class="value">${escapeHtml(b.age)}</div></div>` : ''}
            ${b.gender ? `<div class="char-grid-item"><div class="label">性别</div><div class="value">${escapeHtml(b.gender)}</div></div>` : ''}
            ${b.occupation ? `<div class="char-grid-item"><div class="label">职业</div><div class="value">${escapeHtml(b.occupation)}</div></div>` : ''}
            ${b.nationality ? `<div class="char-grid-item"><div class="label">出身</div><div class="value">${escapeHtml(b.nationality)}</div></div>` : ''}
            ${b.residence ? `<div class="char-grid-item"><div class="label">居住地</div><div class="value">${escapeHtml(b.residence)}</div></div>` : ''}
          </div>
        </div>

        <!-- 外貌 -->
        <div class="char-section">
          <div class="char-section-title">👁️ 外貌特征</div>
          <div class="char-grid">
            ${a.height ? `<div class="char-grid-item"><div class="label">身高</div><div class="value">${escapeHtml(a.height)}</div></div>` : ''}
            ${a.build ? `<div class="char-grid-item"><div class="label">体型</div><div class="value">${escapeHtml(a.build)}</div></div>` : ''}
            ${a.hair ? `<div class="char-grid-item"><div class="label">发型发色</div><div class="value">${escapeHtml(a.hair)}</div></div>` : ''}
            ${a.eyes ? `<div class="char-grid-item"><div class="label">瞳色</div><div class="value">${escapeHtml(a.eyes)}</div></div>` : ''}
            ${a.features ? `<div class="char-grid-item"><div class="label">面部特征</div><div class="value">${escapeHtml(a.features)}</div></div>` : ''}
            ${a.style ? `<div class="char-grid-item"><div class="label">着装风格</div><div class="value">${escapeHtml(a.style)}</div></div>` : ''}
            ${a.distinctive ? `<div class="char-grid-item"><div class="label">显著特征</div><div class="value">${escapeHtml(a.distinctive)}</div></div>` : ''}
          </div>
        </div>

        <!-- 性格 -->
        <div class="char-section">
          <div class="char-section-title">🧠 性格特征${p.type ? ` · ${escapeHtml(p.type)}` : ''}</div>
          ${traits.length ? `<div class="char-trait-list">${traits.map(t => `<span class="char-trait">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
          <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:12px">
            ${strengths.length ? `<div><div style="font-size:12px;color:var(--green);font-weight:600;margin-bottom:6px">✅ 优势</div><div class="char-trait-list">${strengths.map(s => `<span class="char-trait green">${escapeHtml(s)}</span>`).join('')}</div></div>` : ''}
            ${weaknesses.length ? `<div><div style="font-size:12px;color:var(--red);font-weight:600;margin-bottom:6px">⚠️ 弱点</div><div class="char-trait-list">${weaknesses.map(w => `<span class="char-trait red">${escapeHtml(w)}</span>`).join('')}</div></div>` : ''}
          </div>
          ${p.fears ? `<div style="margin-top:10px;font-size:13px;color:var(--text-2)"><strong style="color:var(--text-3)">恐惧：</strong> ${escapeHtml(p.fears)}</div>` : ''}
          ${p.desire ? `<div style="margin-top:4px;font-size:13px;color:var(--text-2)"><strong style="color:var(--text-3)">欲望：</strong> ${escapeHtml(p.desire)}</div>` : ''}
        </div>

        <!-- 背景 -->
        <div class="char-section">
          <div class="char-section-title">📖 背景故事</div>
          ${bg.origin ? `<div style="margin-bottom:8px;font-size:13px;color:var(--text-3);font-weight:600">出身</div><div class="char-section-content">${escapeHtml(bg.origin)}</div>` : ''}
          ${bg.key_event ? `<div style="margin-top:10px;margin-bottom:6px;font-size:13px;color:var(--text-3);font-weight:600">关键转折</div><div class="char-section-content">${escapeHtml(bg.key_event)}</div>` : ''}
          ${bg.current_status ? `<div style="margin-top:10px;margin-bottom:6px;font-size:13px;color:var(--text-3);font-weight:600">当前状态</div><div class="char-section-content">${escapeHtml(bg.current_status)}</div>` : ''}
          ${bg.secret ? `<div style="margin-top:10px;font-size:14px;background:var(--amber-subtle);border:1px solid rgba(234,179,8,0.2);border-radius:var(--radius-sm);padding:10px 14px;color:var(--amber)">🔐 秘密：${escapeHtml(bg.secret)}</div>` : ''}
        </div>

        <!-- 能力 -->
        <div class="char-section">
          <div class="char-section-title">⚡ 能力</div>
          ${skills.length ? `<div class="char-trait-list">${skills.map(s => `<span class="char-trait amber">${escapeHtml(s)}</span>`).join('')}</div>` : ''}
          ${ab.special ? `<div style="margin-top:10px;font-size:13px;color:var(--text-2)"><strong style="color:var(--text-3)">专长：</strong> ${escapeHtml(ab.special)}</div>` : ''}
          ${ab.limitation ? `<div style="margin-top:4px;font-size:13px;color:var(--text-2)"><strong style="color:var(--text-3)">限制：</strong> ${escapeHtml(ab.limitation)}</div>` : ''}
        </div>

        <!-- 关系 -->
        ${rels.length ? `<div class="char-section"><div class="char-section-title">🔗 人际关系</div>${rels.map(r => `<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px"><strong>${escapeHtml(r.name)}</strong> <span style="color:var(--text-3);font-size:12px">（${escapeHtml(r.relation)}）</span><div style="font-size:13px;color:var(--text-2);margin-top:4px">${escapeHtml(r.description)}</div></div>`).join('')}</div>` : ''}

        <!-- Quote -->
        ${c.quote ? `<div class="char-section"><div class="char-section-title">💬 经典台词</div><div class="char-quote">${escapeHtml(c.quote)}</div></div>` : ''}

        <!-- Prompt -->
        ${c.prompt ? `<div class="char-section"><div class="char-section-title">🎨 AI 图像生成提示词</div><div class="char-prompt-box"><div class="lang-label">Prompt (English)</div>${escapeHtml(c.prompt)}</div></div>` : ''}
      </div>
    `;
    charCardContainer.innerHTML = '';
    charCardContainer.appendChild(card);
  }

  // ── Copy ──
  copyBtn.addEventListener('click', () => {
    if (!currentCharacter) return;
    const c = currentCharacter;
    const b = c.basic || {};
    const a = c.appearance || {};
    const p = c.personality || {};
    const bg = c.background || {};
    const ab = c.abilities || {};
    const rels = c.relationships || [];

    let text = `# ${c.name || '未命名角色'}\n`;
    text += `**角色定位**: ${c.role || '-'}  |  **称号**: ${c.title || '-'}\n\n`;
    text += `## 基本信息\n`;
    text += `- 年龄: ${b.age || '-'}\n- 性别: ${b.gender || '-'}\n- 职业: ${b.occupation || '-'}\n- 出身: ${b.nationality || '-'}\n- 居住地: ${b.residence || '-'}\n\n`;
    text += `## 外貌特征\n`;
    text += `- 身高: ${a.height || '-'}\n- 体型: ${a.build || '-'}\n- 发色: ${a.hair || '-'}\n- 瞳色: ${a.eyes || '-'}\n- 面部特征: ${a.features || '-'}\n- 着装: ${a.style || '-'}\n- 显著特征: ${a.distinctive || '-'}\n\n`;
    text += `## 性格特征${p.type ? ' (' + p.type + ')' : ''}\n`;
    text += `- 特点: ${(p.traits || []).join('、')}\n`;
    text += `- 优势: ${(p.strengths || []).join('、')}\n`;
    text += `- 弱点: ${(p.weaknesses || []).join('、')}\n`;
    text += `- 恐惧: ${p.fears || '-'}\n- 欲望: ${p.desire || '-'}\n\n`;
    text += `## 背景故事\n${bg.origin || '-'}\n\n`;
    text += `关键转折: ${bg.key_event || '-'}\n`;
    text += `当前状态: ${bg.current_status || '-'}\n`;
    if (bg.secret) text += `秘密: ${bg.secret}\n`;
    text += `\n## 能力\n- 技能: ${(ab.skills || []).join('、')}\n- 专长: ${ab.special || '-'}\n- 限制: ${ab.limitation || '-'}\n\n`;
    if (rels.length) {
      text += `## 人际关系\n`;
      rels.forEach(r => { text += `- ${r.name}（${r.relation}）: ${r.description}\n`; });
      text += `\n`;
    }
    if (c.quote) text += `## 经典台词\n「${c.quote}」\n\n`;
    if (c.prompt) text += `## AI 提示词\n\`\`\`\n${c.prompt}\n\`\`\`\n`;

    navigator.clipboard.writeText(text).then(() => {
      showToast('📋 角色设定已复制');
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('📋 角色设定已复制');
    });
  });

  // ── Export ──
  exportBtn.addEventListener('click', () => {
    if (!currentCharacter) return;
    const c = currentCharacter;
    const charName = c.name || '角色设定卡';
    let md = `# ${charName}\n\n`;
    md += `**角色定位**: ${c.role || '-'}  |  **称号**: ${c.title || '-'}\n\n---\n\n`;
    md += generateMarkdownSection(c);
    const blob = new Blob([md], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `角色设定-${charName}-${new Date().toISOString().slice(0,10)}.md`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📥 Markdown 已导出');
  });

  function generateMarkdownSection(c) {
    const b = c.basic || {};
    const a = c.appearance || {};
    const p = c.personality || {};
    const bg = c.background || {};
    const ab = c.abilities || {};
    const rels = c.relationships || [];
    let md = '';

    md += `## 基本信息\n\n`;
    md += `| 项目 | 内容 |\n| --- | --- |\n`;
    if (b.age) md += `| 年龄 | ${b.age} |\n`;
    if (b.gender) md += `| 性别 | ${b.gender} |\n`;
    if (b.occupation) md += `| 职业 | ${b.occupation} |\n`;
    if (b.nationality) md += `| 出身 | ${b.nationality} |\n`;
    if (b.residence) md += `| 居住地 | ${b.residence} |\n`;
    md += `\n`;

    md += `## 外貌特征\n\n`;
    md += `| 项目 | 内容 |\n| --- | --- |\n`;
    if (a.height) md += `| 身高 | ${a.height} |\n`;
    if (a.build) md += `| 体型 | ${a.build} |\n`;
    if (a.hair) md += `| 发色 | ${a.hair} |\n`;
    if (a.eyes) md += `| 瞳色 | ${a.eyes} |\n`;
    if (a.features) md += `| 面部特征 | ${a.features} |\n`;
    if (a.style) md += `| 着装 | ${a.style} |\n`;
    if (a.distinctive) md += `| 显著特征 | ${a.distinctive} |\n`;
    md += `\n`;

    md += `## 性格特征${p.type ? '（' + p.type + '）' : ''}\n\n`;
    if ((p.traits || []).length) md += `- **特点**: ${p.traits.join('、')}\n`;
    if ((p.strengths || []).length) md += `- **优势**: ${p.strengths.join('、')}\n`;
    if ((p.weaknesses || []).length) md += `- **弱点**: ${p.weaknesses.join('、')}\n`;
    if (p.fears) md += `- **恐惧**: ${p.fears}\n`;
    if (p.desire) md += `- **欲望**: ${p.desire}\n`;
    md += `\n`;

    md += `## 背景故事\n\n`;
    if (bg.origin) md += `**出身**: ${bg.origin}\n\n`;
    if (bg.key_event) md += `**关键转折**: ${bg.key_event}\n\n`;
    if (bg.current_status) md += `**当前状态**: ${bg.current_status}\n\n`;
    if (bg.secret) md += `> **秘密**: ${bg.secret}\n\n`;
    md += `\n`;

    md += `## 能力\n\n`;
    if ((ab.skills || []).length) md += `- **技能**: ${ab.skills.join('、')}\n`;
    if (ab.special) md += `- **专长**: ${ab.special}\n`;
    if (ab.limitation) md += `- **限制**: ${ab.limitation}\n`;
    md += `\n`;

    if (rels.length) {
      md += `## 人际关系\n\n`;
      rels.forEach(r => { md += `- **${r.name}**（${r.relation}）: ${r.description}\n`; });
      md += `\n`;
    }

    if (c.quote) md += `## 经典台词\n\n> 「${c.quote}」\n\n`;
    if (c.prompt) md += `## AI 图像生成提示词\n\n\`\`\`\n${c.prompt}\n\`\`\`\n`;

    return md;
  }

  // ── New ──
  newBtn.addEventListener('click', () => {
    resultsSection.classList.remove('active');
    charCardContainer.innerHTML = '';
    currentCharacter = null;
    charInput.focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  function showError(msg) {
    errorMessage.textContent = msg;
    errorMessage.classList.add('active');
    loadingState.classList.remove('active');
  }
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('active');
    setTimeout(() => toast.classList.remove('active'), 3000);
  }
  function escapeHtml(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  console.log('👤 AI 角色设定卡生成器已加载');
})();
</script>
</body>
</html>
